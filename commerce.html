<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce OOP Demo (Tailwind)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">Tech Store Checkout</h1>
        
        <div id="product-list" class="space-y-3 mb-6"></div>

        <button id="checkout-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 shadow-sm">
            Proceed to Checkout
        </button>

        <div id="receipt-output" class="hidden mt-6 p-4 bg-slate-50 border-l-4 border-blue-500 rounded-r-lg text-slate-700 whitespace-pre-line leading-relaxed shadow-inner"></div>
    </div>

    <script src="commerce.js"></script>
</body>
</html>
