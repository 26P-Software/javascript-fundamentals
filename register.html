<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - TaskOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen font-sans flex items-center justify-center p-4 transition-colors duration-200">

    <div class="max-w-md w-full bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 p-8 rounded-2xl shadow-xl space-y-6">
        <div class="text-center">
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl mx-auto shadow-md shadow-indigo-100 dark:shadow-none mb-3">T</div>
            <h2 class="text-2xl font-bold tracking-tight">Create your profile</h2>
            <p class="text-sm text-slate-400 mt-1">Get started with our task optimization pipeline</p>
        </div>
        
        <form id="register_form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Username</label>
                <input type="text" id="reg_username" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm placeholder:text-slate-400 dark:text-white" placeholder="johndoe">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Password</label>
                <input type="password" id="reg_password" required class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm placeholder:text-slate-400 dark:text-white" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-sm transition-all shadow-md shadow-indigo-100 dark:shadow-none active:scale-[0.99]">Register Account</button>
        </form>
        
        <p class="text-xs text-center text-slate-400">Already have a system profile? <a href="index.html" class="text-indigo-600 dark:text-indigo-400 font-semibold hover:underline">Log in</a></p>
    </div>

    <div id="page_marker" data-page="register"></div>
    <script src="todo.js"></script>
</body>
</html>
