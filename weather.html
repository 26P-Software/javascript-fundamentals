<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zindua Weather Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center p-4">

    <main class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-sm p-6 space-y-6">
        
        <header class="text-center">
            <h1 class="text-xl font-semibold text-gray-900">Secure Weather Gateway</h1>
            <p class="text-xs text-gray-500 mt-1">Consuming remote metrics via a backend server proxy pipeline</p>
        </header>

        <form id="weather-form" class="space-y-3">
            <div class="flex flex-col space-y-1.5">
                <label for="city-input" class="text-xs font-medium text-gray-600">Global City Lookup</label>
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="e.g., Nairobi, London, Tokyo" 
                    required
                    class="w-full border border-gray-300 px-3 py-2.5 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                >
            </div>
            
            <button 
                type="submit" 
                class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2.5 px-4 rounded-xl text-sm transition-colors duration-150"
            >
                Analyze Target City
            </button>
        </form>

        <div id="weather-result" class="text-sm text-center text-gray-400 py-4 border-t border-dashed border-gray-100">
            Enter a target city above to initialize the data streaming sequence.
        </div>

    </main>

    <footer class="mt-6 text-center">
        <p class="text-[11px] uppercase tracking-wider text-gray-400">Environment Node: Local Proxy Server Interface</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
