<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rick and Morty Characters</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#111827] text-gray-100 font-sans min-h-screen pb-12">

  <header class="text-center py-8">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-lime-400 to-green-500 drop-shadow-md">
      Rick and Morty Characters
    </h1>
  </header>

  <div class="flex justify-center mb-10 px-4">
    <input 
      type="text" 
      id="search" 
      placeholder="Search characters by name..." 
      class="px-5 py-3 w-full max-w-md rounded-xl bg-gray-800 text-white placeholder-gray-400 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:border-transparent shadow-lg transition-all"
    />
  </div>

  <main 
    id="character-list" 
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 max-w-7xl mx-auto px-6"
  ></main>

  <script src="character.js"></script>
</body>
</html>
